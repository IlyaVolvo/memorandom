<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorandom — Word Memory Game</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Memorandom</h1>
      <p id="header-status" class="header-status"></p>
      <button id="settings-btn" class="btn btn-ghost btn-settings header-settings" title="Change game settings">⚙ Settings</button>
    </header>

    <!-- Settings Screen (only via Settings button) -->
    <section id="config-screen" class="screen">
      <div class="config-card">
        <h2>Settings</h2>
        <div class="config-grid">
          <div class="config-row">
            <input type="number" id="lifelines" value="5" min="1" max="20">
            <span>Lifelines</span>
          </div>
          <div class="config-row">
            <input type="number" id="initial-words" value="3" min="2" max="10">
            <span>Initial words per attempt</span>
          </div>
          <div class="config-row">
            <input type="number" id="seconds-per-word" value="2" min="1" max="10">
            <span>Seconds per word</span>
          </div>
          <div class="config-row">
            <input type="number" id="attempts-per-round" value="4" min="2" max="10">
            <span>Additional per round</span>
          </div>
          <div class="config-row">
            <input type="number" id="max-complexity" value="3" min="1" max="3">
            <span>Max Complexity (1–3)</span>
          </div>
          <label class="config-checkbox">
            <input type="checkbox" id="mix-mode">
            <span>Mix Categories</span>
          </label>
          <div class="config-categories">
            <span class="config-label">Categories</span>
            <div id="category-checkboxes" class="category-checkboxes"></div>
          </div>
        </div>
        <div class="config-actions">
        <button id="start-btn" class="btn btn-primary">Start Game</button>
        <span id="settings-saved-hint" class="settings-saved-hint" aria-live="polite"></span>
      </div>
      </div>
    </section>

    <!-- Game Screen -->
    <section id="game-screen" class="screen active">
      <div id="game-content">
        <!-- Phase: Start (initial / ready to play) -->
        <div id="start-phase" class="phase">
          <button id="start-game-btn" class="btn btn-primary">Start Game</button>
        </div>
        <!-- Phase: Study + Answer (shared rectangles) -->
        <div id="play-phase" class="phase hidden">
          <div id="word-slots" class="word-slots"></div>
          <button id="ready-btn" type="button" class="btn btn-primary ready-btn">Ready</button>
        </div>
        <!-- Round over flash -->
        <div id="round-over-phase" class="phase hidden">
          <p id="round-over-message" class="round-over-message"></p>
        </div>
        <!-- Game Over -->
        <div id="game-over-phase" class="phase hidden">
          <div id="game-over-words" class="game-over-columns"></div>
          <p class="final-score">Points: <span id="final-score">0</span></p>
          <button id="game-over-start-btn" class="btn btn-primary">Start Game</button>
        </div>
      </div>
    </section>
  </div>

  <script src="game.js?v=10"></script>
</body>
</html>

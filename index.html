<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorandom — Word Memory Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Memorandom</h1>
      <p class="subtitle">Train your word memory</p>
    </header>

    <!-- Config Screen -->
    <section id="config-screen" class="screen active">
      <div class="config-card">
        <h2>Game Settings</h2>
        <div class="config-grid">
          <label>
            <span>Lifelines (X)</span>
            <input type="number" id="lifelines" value="5" min="1" max="20">
          </label>
          <label>
            <span>Initial words per attempt (N)</span>
            <input type="number" id="initial-words" value="3" min="2" max="10">
          </label>
          <label>
            <span>Seconds per word (T)</span>
            <input type="number" id="seconds-per-word" value="2" min="1" max="10">
          </label>
          <label>
            <span>Attempts per round (M)</span>
            <input type="number" id="attempts-per-round" value="4" min="2" max="10">
          </label>
        </div>
        <button id="start-btn" class="btn btn-primary">Start Game</button>
      </div>
    </section>

    <!-- Game Screen -->
    <section id="game-screen" class="screen">
      <div class="game-stats">
        <div class="stat lifelines">
          <span class="stat-label">Lifelines</span>
          <span id="lifelines-display" class="stat-value">5</span>
          <span id="hearts" class="hearts"></span>
        </div>
        <div class="stat points">
          <span class="stat-label">Points</span>
          <span id="points-display" class="stat-value">0</span>
        </div>
        <div class="stat round">
          <span class="stat-label">Round</span>
          <span id="round-display" class="stat-value">1</span>
        </div>
        <button id="restart-game-btn" class="btn btn-ghost">Start Over</button>
      </div>

      <div id="game-content">
        <!-- Phase: Watching words -->
        <div id="watch-phase" class="phase hidden">
          <p class="phase-hint">Memorize the words...</p>
          <div id="word-display" class="word-display"></div>
          <div id="word-countdown" class="countdown"></div>
        </div>

        <!-- Phase: Writing words -->
        <div id="write-phase" class="phase hidden">
          <p class="phase-hint">Write the words in order (Enter on last slot to submit):</p>
          <div id="word-inputs-container" class="word-inputs"></div>
        </div>

        <!-- Phase: Recall previous rounds -->
        <div id="recall-phase" class="phase hidden">
          <p class="phase-hint recall-hint">Recall all words from previous round(s). Points doubled! (Enter on last slot to submit)</p>
          <div id="recall-inputs-container" class="word-inputs"></div>
        </div>

        <!-- Game Over -->
        <div id="game-over-phase" class="phase hidden">
          <h2>Game Over</h2>
          <p class="final-score">Final Score: <span id="final-score">0</span> points</p>
          <button id="restart-btn" class="btn btn-primary">Play Again</button>
        </div>
      </div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
